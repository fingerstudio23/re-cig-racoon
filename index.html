<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Re-Cig Raccoon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d1117;font-family:Arial,sans-serif;touch-action:none}
#root{display:flex;flex-direction:column;align-items:center;width:100%;height:100%;padding:4px}
#hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:4px 10px;color:#fff;font-size:12px;font-weight:bold;background:rgba(255,255,255,0.07);border-radius:6px;margin-bottom:3px;flex-shrink:0}
#banner{width:100%;text-align:center;font-size:12px;font-weight:bold;padding:3px 0;border-radius:5px;margin-bottom:3px;flex-shrink:0;color:#aaa;background:rgba(40,40,40,0.85)}
#wrap{position:relative;width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
canvas{display:block;border-radius:8px;border:2px solid #2a5a8c;touch-action:none}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,10,25,0.95);border-radius:8px;padding:16px;text-align:center;z-index:20;overflow-y:auto}
h1{color:#FFD700;font-size:22px;margin-bottom:6px}
.sub{color:#aaa;font-size:12px;margin-bottom:10px;line-height:1.6}
.btn{background:#27ae60;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;font-weight:bold;cursor:pointer;margin:4px;-webkit-appearance:none}
.btn.blue{background:#2980b9}
.fg{width:100%;max-width:280px;margin:4px 0;text-align:left}
.fg label{display:block;color:#bbb;font-size:11px;margin-bottom:2px}
.fg input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-size:13px;outline:none;-webkit-appearance:none}
#dpad{width:100%;display:flex;justify-content:center;padding:4px 0;flex-shrink:0}
.dp-grid{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px;gap:5px}
.dp-btn{background:rgba(255,255,255,0.13);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:10px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-appearance:none;width:54px;height:54px}
.dp-btn:active{background:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    <span>🏆 <span id="sc">0</span></span>
    <span style="color:#FFD700;font-size:11px;letter-spacing:1px">RE-CIG RACCOON</span>
    <span id="lv">🦝🦝🦝</span>
  </div>
  <div id="banner">🟢 Raccogli cicche · ★ Power-up per mangiare i fantasmi</div>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h1>🦝 RE-CIG RACCOON</h1>
      <p class="sub">
        🟢 Raccogli le cicche verdi<br>
        ★ Prendi il <b>power-up</b> per mangiare i fantasmi!<br>
        🚬 Evita le sigarette... finché puoi!<br>
        ↔️ Tunnel laterale per attraversare lo schermo
      </p>
      <button class="btn" id="startBtn">▶ INIZIA A GIOCARE</button>
    </div>
  </div>
  <div id="dpad">
    <div class="dp-grid">
      <div></div>
      <button class="dp-btn" id="dU">▲</button>
      <div></div>
      <button class="dp-btn" id="dL">◀</button>
      <button class="dp-btn" id="dD">▼</button>
      <button class="dp-btn" id="dR">▶</button>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),banner=document.getElementById('banner'),wrap=document.getElementById('wrap');

const COLS=21,ROWS=23;
let T=20,score=0,lives=3,tick=0,state='idle',raf=null;
let map=[],dots=[],powerDots=[],player={},ghosts=[];
let frightTimer=0,frightActive=false,ghostEatCombo=0;
let deathAnim=null,floatScores=[];

const TUNNEL_ROW=10;

// Mappe — riga TUNNEL_ROW ha spazio aperto sui bordi (no X)
const MAP_A=[
  "XXXXXXXXXXXXXXXXXXXXX",
  "X........X........X X",
  "X.XX.XXX.X.XXX.XX.X X",
  "Xo.................oX",
  "X.XX.X.XXXXX.X.XX.XXX",
  "X....X...X...X....X X",
  "XXXX.XXX.X.XXX.XXXXXX",
  "   X.X       X.X     ",
  "XXXX.X XX XX X.XXXXXX",
  "XXXX.   GGG   .XXXXXX",
  "     .         .     ",
  "XXXX.X XXXXX X.XXXXXX",
  "   X.X       X.X     ",
  "XXXX.XXX.X.XXX.XXXXXX",
  "X....X...X...X....X X",
  "X.XX.X.XXXXX.X.XX.XXX",
  "Xo.................oX",
  "X.XX.XXX.X.XXX.XX.X X",
  "X....X...........X X X",
  "X.......P.........X X",
  "X.XXXXXXXXXXXXXXXXX X",
  "X.................X X",
  "XXXXXXXXXXXXXXXXXXXXX",
];

const MAP_B=[
  "XXXXXXXXXXXXXXXXXXXXX",
  "X...................X",
  "X.XXXXX.XXX.XXXXX..X",
  "Xo....X.X.X.X....o.X",
  "XXXXX.X.X.X.X.XXXXXXX",
  "X.....X.....X.......X",
  "X.XXX.XXXXXXX.XXX...X",
  "X.X...........X.....X",
  "X.X.XXXXXXXXX.X.....X",
  "X...X  GGG   X......X",
  "     .         .     ",
  "X.X.XXXXXXXXX.X.....X",
  "X.X...........X.....X",
  "X.XXX.XXXXXXX.XXX...X",
  "X.....X.....X.......X",
  "XXXXX.X.X.X.X.XXXXXXX",
  "Xo....X.X.X.X....o.X",
  "X.XXXXX.XXX.XXXXX..X",
  "X...................X",
  "X.......P.........X X",
  "X.XXXXXXXXXXXXXXXXX X",
  "X.................X X",
  "XXXXXXXXXXXXXXXXXXXXX",
];

const MAPS=[MAP_A,MAP_B];
const GSPAWNS=[{x:1,y:2},{x:19,y:2},{x:1,y:20},{x:19,y:20}];
const GCOLS=['#FF6B9D','#FFB347','#87CEEB','#98FB98'];

function resize(){
  const W=wrap.clientWidth||300,H=wrap.clientHeight||300;
  T=Math.max(13,Math.floor(Math.min(W/COLS,H/ROWS)));
  canvas.width=T*COLS;canvas.height=T*ROWS;
}

// Muro: la riga TUNNEL_ROW è sempre passabile su tutto COLS
function wall(c,r){
  if(r===TUNNEL_ROW) return false; // tutta la riga tunnel è aperta
  if(r<0||r>=ROWS||c<0||c>=COLS) return true;
  return map[r]&&map[r][c]===1;
}

function build(){
  const chosen=MAPS[Math.floor(Math.random()*MAPS.length)];
  map=[];dots=[];powerDots=[];
  let ps={x:10,y:19};
  for(let r=0;r<ROWS;r++){
    map[r]=[];
    const row=chosen[r]||'';
    for(let c=0;c<COLS;c++){
      const ch=row[c]||' ';
      map[r][c]=ch==='X'?1:0;
      if(ch==='P') ps={x:c,y:r};
      if(ch==='.') dots.push({x:c,y:r,eaten:false});
      if(ch==='o'){dots.push({x:c,y:r,eaten:false});powerDots.push({x:c,y:r});}
    }
  }
  player={
    x:ps.x,y:ps.y,px:ps.x,py:ps.y,
    dx:0,dy:0,ndx:0,ndy:0,
    mt:0,spd:18,
    buffDx:0,buffDy:0,buffTimer:0,
    moving:false, // true solo se l'ultimo step si è mosso davvero
    alive:true
  };
  ghosts=GSPAWNS.map((s,i)=>{
    let sx=s.x,sy=s.y;
    outer:for(let dr=-3;dr<=3;dr++)for(let dc=-3;dc<=3;dc++){if(!wall(sx+dc,sy+dr)&&sy+dr!==TUNNEL_ROW){sx+=dc;sy+=dr;break outer;}}
    return{x:sx,y:sy,px:sx,py:sy,dx:0,dy:0,color:GCOLS[i],dead:false,mt:0,spd:24,dt:0,di:50+i*14,fright:false,stuckTimer:0};
  });
  frightTimer=0;frightActive=false;ghostEatCombo=0;
  deathAnim=null;floatScores=[];
  updateBanner();
}

function allDirs(g){
  return[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}].filter(d=>!wall(g.x+d.dx,g.y+d.dy));
}
function openDirs(g){
  // esclude direzione opposta se ci sono alternative
  const all=allDirs(g);
  const noBack=all.filter(d=>!(d.dx===-g.dx&&d.dy===-g.dy));
  return noBack.length>0?noBack:all; // se bloccato su tutti gli altri, ammetti inversione
}

function wrapTunnel(x){return((x%COLS)+COLS)%COLS;}

function stepPlayer(){
  if(!player.alive)return;
  player.mt++;
  // Buffer input
  if(player.ndx!==0||player.ndy!==0){player.buffDx=player.ndx;player.buffDy=player.ndy;player.buffTimer=14;}
  if(player.buffTimer>0)player.buffTimer--;else{player.buffDx=0;player.buffDy=0;}

  if(player.mt<player.spd)return;
  player.mt=0;

  // Prova a girare nella direzione bufferizzata
  if(player.buffDx!==0||player.buffDy!==0){
    const nx=player.x+player.buffDx,ny=player.y+player.buffDy;
    if(!wall(nx,ny)){
      player.dx=player.buffDx;player.dy=player.buffDy;
      player.buffDx=0;player.buffDy=0;player.buffTimer=0;
    }
  }

  if(!player.dx&&!player.dy){player.moving=false;return;}

  let nx=player.x+player.dx,ny=player.y+player.dy;
  // Tunnel wrap: teletrasporto solo quando esce dai bordi
  if(player.y===TUNNEL_ROW){
    if(nx<0){player.x=COLS-1;player.px=COLS-1;player.mt=player.spd;player.moving=false;return;}
    if(nx>=COLS){player.x=0;player.px=0;player.mt=player.spd;player.moving=false;return;}
  }

  if(!wall(nx,ny)){
    player.px=player.x;player.py=player.y;
    player.x=nx;player.y=ny;
    player.moving=true;
  } else {
    // FIX rimbalzo: se muro, fermo secco — px=x, py=y
    player.px=player.x;player.py=player.y;
    player.moving=false;
  }

  // Raccogli cicche
  dots.forEach(d=>{
    if(!d.eaten&&d.x===player.x&&d.y===player.y){
      d.eaten=true;score+=10;
      if(powerDots.some(p=>p.x===d.x&&p.y===d.y)){
        frightActive=true;frightTimer=300;ghostEatCombo=0;
        ghosts.forEach(g=>{if(!g.dead)g.fright=true;});
        updateBanner(true);
      }
    }
  });
}

function stepGhost(g){
  if(g.dead)return;
  const spd=g.fright?g.spd+8:g.spd;
  g.mt++;if(g.mt<spd)return;g.mt=0;

  // Sceglie nuova direzione periodicamente
  g.dt++;
  if(g.dt>=g.di){
    g.dt=0;
    const dirs=openDirs(g);
    if(dirs.length){
      const ch=g.fright
        ?dirs[Math.floor(Math.random()*dirs.length)]
        :dirs.reduce((b,d)=>{
            const dist=Math.hypot(g.x+d.dx-player.x,g.y+d.dy-player.y);
            return dist<b.dist?{d,dist}:b;
          },{d:dirs[0],dist:Infinity}).d;
      g.dx=ch.dx;g.dy=ch.dy;
    }
  }

  // Se non ha direzione, prendi una a caso
  if(!g.dx&&!g.dy){
    const dirs=allDirs(g);
    if(dirs.length){const d=dirs[Math.floor(Math.random()*dirs.length)];g.dx=d.dx;g.dy=d.dy;}
    return;
  }

  // Prova a muoversi
  let nx=g.x+g.dx,ny=g.y+g.dy;
  // Tunnel per i fantasmi
  if(g.y===TUNNEL_ROW){
    if(nx<0){g.x=COLS-1;g.px=COLS-1;return;}
    if(nx>=COLS){g.x=0;g.px=0;return;}
  }

  if(!wall(nx,ny)){
    g.px=g.x;g.py=g.y;g.x=nx;g.y=ny;
    g.stuckTimer=0;
  } else {
    // FIX angoli: se muro, cambia subito direzione — inverti o random
    g.stuckTimer++;
    const dirs=openDirs(g);
    if(dirs.length){
      const d=dirs[Math.floor(Math.random()*dirs.length)];
      g.dx=d.dx;g.dy=d.dy;
    } else {
      // completamente bloccato: inverti
      g.dx=-g.dx;g.dy=-g.dy;
    }
  }
}

function checkHits(){
  if(!player.alive)return;
  ghosts.forEach((g,idx)=>{
    if(g.dead)return;
    if(Math.abs(g.x-player.x)<1&&Math.abs(g.y-player.y)<1){
      if(g.fright){
        g.dead=true;g.fright=false;
        ghostEatCombo++;
        const pts=[200,400,800,1600][Math.min(ghostEatCombo-1,3)];
        score+=pts;
        floatScores.push({x:g.x*T+T/2,y:g.y*T,val:pts,timer:60});
        setTimeout(()=>{
          g.dead=false;
          let sx=GSPAWNS[idx].x,sy=GSPAWNS[idx].y;
          outer:for(let dr=-3;dr<=3;dr++)for(let dc=-3;dc<=3;dc++){if(!wall(sx+dc,sy+dr)&&sy+dr!==TUNNEL_ROW){sx+=dc;sy+=dr;break outer;}}
          g.x=sx;g.y=sy;g.px=sx;g.py=sy;g.dx=0;g.dy=0;
        },3500);
      } else {
        triggerDeath();
      }
    }
  });
}

function triggerDeath(){
  if(!player.alive)return;
  player.alive=false;state='dying';
  deathAnim={frame:0,maxFrame:55,x:player.x,y:player.y};
}

function stepDeath(){
  if(!deathAnim)return;
  deathAnim.frame++;
  if(deathAnim.frame>=deathAnim.maxFrame){
    deathAnim=null;lives--;
    lvEl.textContent='🦝'.repeat(Math.max(0,lives));
    if(lives<=0){endGame();return;}
    player.x=10;player.y=19;player.px=10;player.py=19;
    player.dx=0;player.dy=0;player.ndx=0;player.ndy=0;
    player.buffDx=0;player.buffDy=0;player.moving=false;player.alive=true;
    ghosts.forEach(g=>{g.fright=false;});
    frightActive=false;frightTimer=0;updateBanner();
    state='playing';
  }
}

function stepFright(){
  if(!frightActive)return;
  frightTimer--;
  if(frightTimer<=0){frightActive=false;ghosts.forEach(g=>{g.fright=false;});ghostEatCombo=0;updateBanner();}
}

function updateBanner(power){
  if(power||frightActive){
    banner.style.background='rgba(20,60,180,0.85)';banner.style.color='#cce0ff';
    banner.textContent='⚡ POWER-UP! Mangia le sigarette!';
  } else {
    banner.style.background='rgba(40,40,40,0.85)';banner.style.color='#aaa';
    banner.textContent='🟢 Raccogli cicche · ★ Power-up per mangiare i fantasmi';
  }
}

function drawRaccoon(cx,cy,dx,dy,t,alpha){
  ctx.globalAlpha=alpha||1;
  const s=T/24,ang=(dx||dy)?Math.atan2(dy,dx):0,mo=Math.abs(Math.sin(t*0.18))*0.45;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);ctx.scale(s,s);
  ctx.beginPath();ctx.arc(0,0,9,mo,Math.PI*2-mo);ctx.lineTo(0,0);ctx.fillStyle='#8B7355';ctx.fill();
  ctx.fillStyle='#6B5335';
  ctx.beginPath();ctx.arc(-2,-5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-5,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#C4A882';ctx.beginPath();ctx.arc(0,0,5,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(-3,-1,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-1,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#555';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-4,2);ctx.lineTo(-8,0);ctx.moveTo(-4,2);ctx.lineTo(-8,4);ctx.moveTo(4,2);ctx.lineTo(8,0);ctx.moveTo(4,2);ctx.lineTo(8,4);ctx.stroke();
  ctx.restore();ctx.globalAlpha=1;
}

function drawDeathAnim(){
  if(!deathAnim)return;
  const prog=deathAnim.frame/deathAnim.maxFrame;
  const cx=deathAnim.x*T+T/2,cy=deathAnim.y*T+T/2;
  ctx.globalAlpha=1-prog;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(prog*Math.PI*3);ctx.scale((1-prog*0.7)*T/24,(1-prog*0.7)*T/24);
  ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fillStyle='#8B7355';ctx.fill();
  ctx.fillStyle='#6B5335';
  ctx.beginPath();ctx.arc(-2,-5,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-5,3,0,Math.PI*2);ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}

function drawGhost(cx,cy,col,fright,dead){
  if(dead)return;
  const flash=fright&&frightTimer<80&&Math.floor(tick/8)%2===0;
  const s=T/24,bc=fright?(flash?'#fff':'#4488ff'):col;
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  ctx.fillStyle='#eee';ctx.fillRect(-5,-11,10,18);
  ctx.fillStyle='#F5DEB3';ctx.fillRect(-5,-11,10,9);
  ctx.fillStyle=fright?'#4488ff':'#FF8C00';ctx.fillRect(-5,-15,10,6);
  if(!fright){ctx.fillStyle='#ff3300';ctx.beginPath();ctx.arc(0,-17,3,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=bc;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(-5+i*3.5,8,2.2,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=fright?'#88aaff':'#111';
  ctx.beginPath();ctx.arc(-2,1,1.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,1,1.8,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function render(){
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,canvas.width,canvas.height);

  // Muri — salta riga tunnel per tenerla aperta visivamente
  for(let r=0;r<ROWS;r++){
    if(r===TUNNEL_ROW)continue; // riga tunnel: niente muri disegnati
    for(let c=0;c<COLS;c++){
      if(map[r][c]===1){
        ctx.fillStyle='#162a40';ctx.fillRect(c*T,r*T,T,T);
        ctx.strokeStyle='#1e4060';ctx.lineWidth=0.5;ctx.strokeRect(c*T+0.5,r*T+0.5,T-1,T-1);
      }
    }
  }

  // Frecce tunnel agli estremi
  ctx.fillStyle='rgba(255,220,50,0.55)';
  const ty=TUNNEL_ROW*T+T/2;
  // Sinistra
  ctx.beginPath();ctx.moveTo(T*0.7,ty-T*0.3);ctx.lineTo(T*0.1,ty);ctx.lineTo(T*0.7,ty+T*0.3);ctx.fill();
  // Destra
  ctx.beginPath();ctx.moveTo((COLS-1)*T+T*0.3,ty-T*0.3);ctx.lineTo((COLS-1)*T+T*0.9,ty);ctx.lineTo((COLS-1)*T+T*0.3,ty+T*0.3);ctx.fill();

  // Cicche
  dots.forEach(d=>{
    if(d.eaten)return;
    const cx=d.x*T+T/2,cy=d.y*T+T/2,isPow=powerDots.some(p=>p.x===d.x&&p.y===d.y);
    if(isPow){
      const pulse=0.65+0.35*Math.sin(tick*0.18);
      ctx.fillStyle=`rgba(255,215,0,${pulse})`;
      ctx.beginPath();ctx.arc(cx,cy,T*0.28,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.font=`${Math.floor(T*0.4)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('★',cx,cy);
    } else {
      ctx.fillStyle='rgba(100,220,100,0.9)';
      ctx.beginPath();ctx.arc(cx,cy,T*0.13,0,Math.PI*2);ctx.fill();
    }
  });

  // Fantasmi
  ghosts.forEach(g=>{
    const p=Math.min(1,g.mt/Math.max(g.fright?g.spd+8:g.spd,1));
    const gx=(g.px+(g.x-g.px)*p)*T+T/2;
    const gy=(g.py+(g.y-g.py)*p)*T+T/2;
    drawGhost(gx,gy,g.color,g.fright,g.dead);
  });

  // Procione
  if(deathAnim){
    drawDeathAnim();
  } else if(player.alive){
    // Interpolazione sempre smooth — stop secco solo se fermo
    const p=player.moving?Math.min(1,player.mt/Math.max(player.spd,1)):1;
    const px=(player.px+(player.x-player.px)*p)*T+T/2;
    const py2=(player.py+(player.y-player.py)*p)*T+T/2;
    drawRaccoon(px,py2,player.dx,player.dy,tick,1);
  }

  // Punteggi galleggianti
  floatScores=floatScores.filter(f=>f.timer>0);
  floatScores.forEach(f=>{
    f.timer--;f.y-=0.5;
    ctx.globalAlpha=f.timer/60;
    ctx.fillStyle='#FFD700';ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.fillText('+'+f.val,f.x,f.y);ctx.globalAlpha=1;
  });

  scEl.textContent=score;
}

function loop(){
  if(state==='dying'){stepDeath();render();raf=requestAnimationFrame(loop);return;}
  if(state!=='playing')return;
  tick++;stepFright();stepPlayer();ghosts.forEach(stepGhost);checkHits();
  if(!dots.some(d=>!d.eaten)){showEnd(true);return;}
  render();raf=requestAnimationFrame(loop);
}

function startGame(){
  cancelAnimationFrame(raf);
  score=0;lives=3;tick=0;deathAnim=null;floatScores=[];
  lvEl.textContent='🦝🦝🦝';
  resize();build();state='playing';overlay.style.display='none';loop();
}
function endGame(){state='over';cancelAnimationFrame(raf);showEnd(false);}

function showEnd(win){
  state='end';overlay.style.display='flex';
  overlay.innerHTML=`
    <h1>${win?'🎉 BRAVO!':'💨 Game Over'}</h1>
    <p class="sub">${win?'Hai raccolto tutte le cicche!':'Troppi mozziconi!'}<br>Punteggio: <b style="color:#FFD700">${score}</b><br><br>Lascia i dati e ritira il tuo premio!</p>
    <div class="fg"><label>Nome e Cognome *</label><input id="fn" type="text" placeholder="Mario Rossi" autocomplete="name"></div>
    <div class="fg"><label>Email *</label><input id="fe" type="email" placeholder="mario@email.com" autocomplete="email"></div>
    <div class="fg"><label>Telefono</label><input id="fp" type="tel" placeholder="+39 000 0000000" autocomplete="tel"></div>
    <div style="margin-top:10px">
      <button class="btn" id="subBtn">🎁 RITIRA PREMIO</button>
      <button class="btn blue" id="reBtn" style="margin-top:4px">🔄 Riprova</button>
    </div>`;
  document.getElementById('subBtn').addEventListener('click',submitForm);
  document.getElementById('reBtn').addEventListener('click',startGame);
}

function submitForm(){
  const name=document.getElementById('fn').value.trim(),email=document.getElementById('fe').value.trim();
  if(!name||!email){alert('Inserisci nome e email!');return;}
  overlay.innerHTML=`
    <h1>🦝 Perfetto!</h1>
    <p class="sub">Mostra questo schermo allo staff Re-Cig.</p>
    <div style="background:rgba(255,215,0,0.12);border:2px solid #FFD700;border-radius:10px;padding:14px;margin:10px 0;width:100%;max-width:260px">
      <p style="color:#FFD700;font-size:16px;font-weight:bold">🎁 PREMIO RISERVATO</p>
      <p style="color:#fff;font-size:13px;margin-top:5px"><b>${name}</b></p>
      <p style="color:#aaa;font-size:11px">${score} punti · Ecomondo Rimini</p>
    </div>
    <p style="color:#88ee88;font-size:11px;margin-bottom:12px">♻️ Insieme per un ambiente più pulito!</p>
    <button class="btn blue" id="reBtn2">🔄 Gioca ancora</button>`;
  document.getElementById('reBtn2').addEventListener('click',startGame);
}

document.addEventListener('keydown',e=>{
  const m={ArrowUp:{dx:0,dy:-1},ArrowDown:{dx:0,dy:1},ArrowLeft:{dx:-1,dy:0},ArrowRight:{dx:1,dy:0}};
  if(m[e.key]){player.ndx=m[e.key].dx;player.ndy=m[e.key].dy;e.preventDefault();}
});

let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(state!=='playing'&&state!=='dying')return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<15&&Math.abs(dy)<15)return;
  if(Math.abs(dx)>Math.abs(dy)){player.ndx=dx>0?1:-1;player.ndy=0;}
  else{player.ndy=dy>0?1:-1;player.ndx=0;}
},{passive:true});

const DMAP={dU:{ndx:0,ndy:-1},dD:{ndx:0,ndy:1},dL:{ndx:-1,ndy:0},dR:{ndx:1,ndy:0}};
['dU','dD','dL','dR'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();player.ndx=DMAP[id].ndx;player.ndy=DMAP[id].ndy;},{passive:false});
  el.addEventListener('click',()=>{player.ndx=DMAP[id].ndx;player.ndy=DMAP[id].ndy;});
});

document.getElementById('startBtn').addEventListener('click',startGame);
window.addEventListener('resize',resize);
</script>
</body>
</html>
